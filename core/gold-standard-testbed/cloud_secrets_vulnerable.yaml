# Gold testbed: Cloud & Secrets (SEC) — YAML/Kubernetes markers.

# Vulnerable: SEC-002 (Secret in ConfigMap)
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  DB_PASSWORD: supersecret

---
# Vulnerable: SEC-003 (Privileged container)
apiVersion: v1
kind: Pod
metadata:
  name: priv-pod
spec:
  containers:
    - name: app
      image: nginx
      securityContext:
        privileged: true

---
# Vulnerable: SEC-004 (HostPath docker.sock mount)
apiVersion: v1
kind: Pod
metadata:
  name: hostpath-pod
spec:
  containers:
    - name: app
      image: nginx
      volumeMounts:
        - name: dockersock
          mountPath: /var/run/docker.sock
  volumes:
    - name: dockersock
      hostPath:
        path: /var/run/docker.sock

---
# Vulnerable: SEC-005 (Service account token auto-mount)
apiVersion: v1
kind: Pod
metadata:
  name: sa-token-pod
spec:
  automountServiceAccountToken: true
  containers:
    - name: app
      image: nginx

---
# Vulnerable: SEC-012 (Broad KMS permissions)
policy:
  Statement:
    - Effect: Allow
      Action: "kms:*"
      Resource: "*"

# Vulnerable: SEC-016 (ExternalSecret required, plain Secret in Git)
apiVersion: v1
kind: Secret
metadata:
  name: payment-db-secret
stringData:
  password: plain-text

---
# Vulnerable: SEC-017 (DB password passed via env)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-api
spec:
  template:
    spec:
      containers:
        - name: api
          image: billing:1.0.0
          env:
            - name: DB_PASSWORD
              value: supersecret

