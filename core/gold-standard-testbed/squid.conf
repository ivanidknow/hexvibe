# Vulnerable: SQD-001 (Allows all clients)
http_access allow all

# Vulnerable: SQD-002 (Plaintext upstream cache peer)
cache_peer upstream.example parent 3128 0 no-query

# Vulnerable: SQD-003 (ssl_bump without strict cert policy)
ssl_bump stare all

# Vulnerable: SQD-004 (Overly broad CONNECT ACL)
acl SSL_ports port 1-65535

# Vulnerable: SQD-005 (No connection limits)
# no maxconn configured

# Vulnerable: SQD-006 (Access logs disabled)
access_log none

# Vulnerable: SQD-007 (Unsafe wildcard refresh_pattern)
refresh_pattern . 0 100% 4320 override-expire

# Vulnerable: SQD-008 (Public DNS resolver)
dns_nameservers 8.8.8.8

# Vulnerable: SQD-009 (No auth requirement for sensitive egress)
# auth_param not configured

# Vulnerable: SQD-010 (No egress domain allowlist)
http_access allow all

# Vulnerable: SQD-011 (Traceability reduced)
forwarded_for off

# Vulnerable: SQD-012 (Cache user/group hardening absent)
cache_dir ufs /var/spool/squid 100 16 256

# Vulnerable: SQD-013 (Metadata endpoint not denied)
# missing acl cloud_meta dst 169.254.169.254/32
