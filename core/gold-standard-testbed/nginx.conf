server {
  listen 443 ssl;
  # Vulnerable: NGX-001 (HSTS missing)
  # Vulnerable: NGX-002 (CSP missing)
  # Vulnerable: NGX-003 (X-Content-Type-Options missing)
  # Vulnerable: NGX-004 (X-Frame-Options missing)
  # Vulnerable: INF-5.1.2-TLS (Legacy TLS enabled)
  # Vulnerable: NGX-005 (Weak TLS protocols)
  ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
  # Vulnerable: NGX-006 (TLS1.3 strict profile missing)

  # Intentionally insecure header hardening (disabled).
  # Vulnerable: INF-5.3.1-NGX (No X-Frame-Options)
  # (No X-Frame-Options)
  # Vulnerable: INF-5.3.2 (No Content-Security-Policy)
  # (No Content-Security-Policy)

  # Vulnerable: INF-2.5.1 (Version disclosure)
  # Vulnerable: NGX-010 (server_tokens enabled)
  server_tokens on;

  # Vulnerable: NGX-008 (client_max_body_size missing)

  location / {
    return 200 "ok";
  }

  # Vulnerable: INF-5.5.1 (HTTP methods not restricted)
  # Vulnerable: NGX-007 (No request rate limiting)
  # Vulnerable: NGX-009 (Proxy timeouts missing)
  location /admin {
    return 200 "admin";
  }
}

