rules:
  - id: hexvibe.ruby-rails.ruby-001
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        expr = params[:expr] raise "invalid" unless expr =~ /\\A[0-9+\\-*\\/(). ]{1,64}\\z/ ... result = safe_math_eval(expr)
    pattern-either:
      - pattern: |-
          expr = params[:expr]
          ...
          result = eval(expr)
      - pattern-regex: 'Vulnerable:\\s*RUBY\\-001\\b'
    message: |-
      HexVibe Detection [RUBY-001]: CWE-94
    languages:
      - ruby
    severity: WARNING
  - id: hexvibe.ruby-rails.ruby-002
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
