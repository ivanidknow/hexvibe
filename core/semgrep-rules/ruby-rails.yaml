      fix_template: |-
        action = params[:action] allowed = { "uptime" => ["uptime"] } raise "blocked" unless allowed.key?(action) ... Open3.capture2e(*allowed[action])
    pattern-either:
      - pattern: |-
          cmd = params[:cmd]
          ...
          system(cmd)
