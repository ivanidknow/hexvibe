      fix_template: |-
        apiVersion: v1 kind: Pod metadata:   name: restricted-pod spec:   containers:   - name: app     image: nginx:1.27     securityContext:       privileged: false
    pattern-either:
      - pattern: |-
          apiVersion: v1
      - pattern-regex: 'Vulnerable:\\s*INF\\-5\\.2\\.1\\b'
    message: |-
