rules:
  - id: hexvibe.fastapi-async.fas-001
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Use strict Pydantic BaseModel schemas for input/output, including response_model and field allowlists.
    pattern-either:
      - pattern: |-
          @limiter.limit("2/minute")
          @app.get("/test")
          async def test(request: Request):
              return "hi"
      - pattern-regex: 'Vulnerable:\\s*FAS\\-001\\b'
    message: |-
      HexVibe Detection [FAS-001]: SlowApi Documentation, FastAPI > Note: route decorator must be above the limit decorator, not below it
    languages:
      - python
    severity: WARNING
