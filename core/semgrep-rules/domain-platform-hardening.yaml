        Удалить bypass, включить pinning/strict TLS validation.
    pattern-either:
      - pattern: |-
          badCertificateCallback => true
      - pattern-regex: 'Vulnerable:\\s*MOB\\-001\\b'
    message: |-
      HexVibe Detection [MOB-001]: Mobile SAR
    languages:
      - generic
    severity: WARNING
