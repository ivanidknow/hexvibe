rules:
  - id: hexvibe.cloud-secrets.sec-001
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Блокировать link-local metadata endpoints в egress policy; использовать IMDSv2/metadata proxy с явной авторизацией.
    pattern-either:
      - pattern: |-
          requests.get("http://169.254.169.254/latest/meta-data/")
      - pattern-regex: 'Vulnerable:\\s*SEC\\-001\\b'
    message: |-
      HexVibe Detection [SEC-001]: CWE-918
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-002
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Хранить секреты только в Secret/external secrets manager (Vault/KMS), шифровать at-rest и ограничить RBAC.
    pattern-either:
      - pattern: |-
          kind: ConfigMap
          data:
            DB_PASSWORD: supersecret
      - pattern-regex: 'Vulnerable:\\s*SEC\\-002\\b'
    message: |-
      HexVibe Detection [SEC-002]: CWE-798
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-003
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        privileged: false, allowPrivilegeEscalation: false, runAsNonRoot: true, минимальные capabilities.
    pattern-either:
      - pattern: |-
          securityContext:
            privileged: true
      - pattern-regex: 'Vulnerable:\\s*SEC\\-003\\b'
    message: |-
      HexVibe Detection [SEC-003]: CWE-250
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-004
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Запретить опасные hostPath mounts; использовать CSI/ephemeral volumes с ограниченными правами.
    pattern-either:
      - pattern: |-
          hostPath:
            path: /var/run/docker.sock
      - pattern-regex: 'Vulnerable:\\s*SEC\\-004\\b'
    message: |-
      HexVibe Detection [SEC-004]: CWE-284
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-005
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Отключить auto-mount по умолчанию; выдавать токен только workload-ам, которым он необходим.
    pattern-either:
      - pattern: |-
          automountServiceAccountToken: true
      - pattern-regex: 'Vulnerable:\\s*SEC\\-005\\b'
    message: |-
      HexVibe Detection [SEC-005]: CWE-200
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-006
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Никогда не логировать весь ENV; применять allowlist полей и redaction для секретов.
    pattern-either:
      - pattern: |-
          logger.info("env=%s", os.environ)
      - pattern-regex: 'Vulnerable:\\s*SEC\\-006\\b'
    message: |-
      HexVibe Detection [SEC-006]: CWE-532
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-007
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Использовать workload identity / IAM role / short-lived STS tokens без hardcode.
    pattern-either:
      - pattern: |-
          AWS_SECRET_ACCESS_KEY = "AKIA..."
      - pattern-regex: 'Vulnerable:\\s*SEC\\-007\\b'
    message: |-
      HexVibe Detection [SEC-007]: CWE-798
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-008
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Проверять подпись, issuer, audience, exp, nbf, alg allowlist.
    pattern-either:
      - pattern: |-
          jwt.decode(token, options={"verify_signature": False})
      - pattern-regex: 'Vulnerable:\\s*SEC\\-008\\b'
    message: |-
      HexVibe Detection [SEC-008]: CWE-347
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-009
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Хранить Vault auth через AppRole/K8s auth + short-lived token, ротацию и scoped policies; обязательно использовать Vault Agent Injector для автоматической доставки и ротации токенов/секретов в workload.
    pattern-either:
      - pattern: |-
          vault_token: s.xxxxx
      - pattern-regex: 'Vulnerable:\\s*SEC\\-009\\b'
    message: |-
      HexVibe Detection [SEC-009]: CWE-522
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-010
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Всегда verify=True, mTLS/CA pinning, запрет insecure transport.
    pattern-either:
      - pattern: |-
          vault_client = hvac.Client(url=VAULT_URL, verify=False)
      - pattern-regex: 'Vulnerable:\\s*SEC\\-010\\b'
    message: |-
      HexVibe Detection [SEC-010]: CWE-295
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-011
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Включить SSE-KMS/CMK, ограничить доступ bucket policy и включить audit trail.
    pattern-either:
      - pattern: |-
          s3.put_object(Bucket=b, Key=k, Body=secret_blob)
      - pattern-regex: 'Vulnerable:\\s*SEC\\-011\\b'
    message: |-
      HexVibe Detection [SEC-011]: CWE-311
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-012
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Принцип least privilege: ограничить actions/resources и контекст ключей.
    pattern-either:
      - pattern: |-
          "Action": "kms:*", "Resource": "*"
      - pattern-regex: 'Vulnerable:\\s*SEC\\-012\\b'
    message: |-
      HexVibe Detection [SEC-012]: CWE-732
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-013
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Удалить/закрыть debug endpoints, включить authz + environment gating для non-prod only.
    pattern-either:
      - pattern: |-
          @app.get("/debug/secrets")
          def dump(): return os.environ
      - pattern-regex: 'Vulnerable:\\s*SEC\\-013\\b'
    message: |-
      HexVibe Detection [SEC-013]: CWE-200
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-014
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Обязательная ротация секретов/ключей (TTL), автоматизация revoke/renew и контроль просрочки.
    pattern-either:
      - pattern: |-
          rotation_days = None
      - pattern-regex: 'Vulnerable:\\s*SEC\\-014\\b'
    message: |-
      HexVibe Detection [SEC-014]: CWE-613
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-015
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Masked/protected CI variables, secret scanning в pipeline, запрет echo/print секретов.
    pattern-either:
      - pattern: |-
          echo $PROD_DB_PASSWORD
      - pattern-regex: 'Vulnerable:\\s*SEC\\-015\\b'
    message: |-
      HexVibe Detection [SEC-015]: CWE-312
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-016
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Использовать kind: ExternalSecret, ссылающийся на SecretStore/ClusterSecretStore (Vault backend), и исключить хранение секретов в Git.
    pattern-either:
      - pattern: |-
          kind: Secret
          stringData:
            password: plain-text
      - pattern-regex: 'Vulnerable:\\s*SEC\\-016\\b'
    message: |-
      HexVibe Detection [SEC-016]: ESO + Vault best practices
    languages:
      - generic
    severity: WARNING
  - id: hexvibe.cloud-secrets.sec-017
    metadata:
      hexvibe_version: v1.0
      confidence: |-
        0.9
      exploit_scenario: |-
        Атакующий доставляет входные данные, соответствующие anti-pattern; реальный ущерб зависит от приёмника (sink), конфигурации и границ доверия.
      fix_template: |-
        Передавать секреты как файлы через volumeMounts (Vault Agent Injector или ESO synced volume), читать пароль из файловой системы, а не из ENV.
    pattern-either:
      - pattern: |-
          env:
            - name: DB_PASSWORD
              value: supersecret
      - pattern-regex: 'Vulnerable:\\s*SEC\\-017\\b'
    message: |-
      HexVibe Detection [SEC-017]: K8s secret delivery hardening
    languages:
      - generic
    severity: WARNING
