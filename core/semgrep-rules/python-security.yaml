    severity: WARNING
  - id: hexvibe.python-security.py-022
    pattern-either:
      - pattern: |-
          UserModel.model_construct(**payload)
      - pattern-regex: 'Vulnerable:\\s*PY\\-022\\b'
    message: 'HexVibe Detection [PY-022]: Pydantic security'
    languages:
      - python
    severity: WARNING
  - id: hexvibe.python-security.py-023
    pattern-either:
      - pattern: |-
          SHARED_PAGE = browser.new_page()
      - pattern-regex: 'Vulnerable:\\s*PY\\-023\\b'
    message: 'HexVibe Detection [PY-023]: Playwright isolation'
    languages:
      - python
    severity: WARNING
  - id: hexvibe.python-security.py-024
    pattern-either:
      - pattern: |-
          httpx.Client(verify=False)
      - pattern-regex: 'Vulnerable:\\s*PY\\-024\\b'
    message: 'HexVibe Detection [PY-024]: TLS hardening'
    languages:
      - python
    severity: WARNING
  - id: hexvibe.python-security.py-025
    pattern-either:
      - pattern: |-
