              data = json.loads(body)
              return data
      - pattern-regex: 'Vulnerable:\\s*PY\\-025\\b'
    message: 'HexVibe Detection [PY-025]: Webhook security'
    languages:
      - python
    severity: WARNING
  - id: hexvibe.python-security.py-026
    pattern-either:
      - pattern: |-
          logger.info("token=%s", token)
      - pattern-regex: 'Vulnerable:\\s*PY\\-026\\b'
    message: 'HexVibe Detection [PY-026]: OWASP Logging'
    languages:
      - python
    severity: WARNING
  - id: hexvibe.python-security.py-027
    pattern-either:
      - pattern: |-
          limit = int(request.args["limit"])
      - pattern-regex: 'Vulnerable:\\s*PY\\-027\\b'
    message: 'HexVibe Detection [PY-027]: Resource abuse prevention'
    languages:
      - python
    severity: WARNING
  - id: hexvibe.python-security.py-028
    pattern-either:
      - pattern: |-
          @app.post("/account/delete")
          async def delete_account():
              ...
      - pattern-regex: 'Vulnerable:\\s*PY\\-028\\b'
    message: 'HexVibe Detection [PY-028]: OWASP CSRF'
    languages:
      - python
    severity: WARNING
  - id: hexvibe.python-security.py-029
    pattern-either:
      - pattern: |-
