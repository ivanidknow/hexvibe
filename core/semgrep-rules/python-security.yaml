  - id: hexvibe.python-security.py-030
    pattern-either:
      - pattern: |-
          return RedirectResponse(next_url)
      - pattern-regex: 'Vulnerable:\\s*PY\\-030\\b'
    message: 'HexVibe Detection [PY-030]: OWASP Open Redirect'
    languages:
      - python
